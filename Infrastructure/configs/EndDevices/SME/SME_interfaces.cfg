# Configuración de RED INTERNA (Hacia los routers)
auto eth0
iface eth0 inet static
    address 192.168.0.10
    netmask 255.255.255.0
    # Al levantar esta interfaz, se inyectan las rutas hacia la topología
    up ip route add 192.168.0.0/16 via 192.168.0.1 dev eth0
    up ip route add 10.0.0.0/8 via 192.168.0.1 dev eth0

# Configuración de INTERNET (Hacia el nodo NAT)
auto eth1
iface eth1 inet dhcp
    # Al levantar internet, aseguramos el DNS
    up echo "nameserver 8.8.8.8" > /etc/resolv.conf